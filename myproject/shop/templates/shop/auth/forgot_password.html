{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | AURUM</title>

    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f4f0e8;
            font-family: 'Jost', sans-serif;
            color: #1a1714;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .auth-wrap {
            width: min(560px, 92%);
            background: #fff;
            padding: 4rem;
            box-shadow: 0 30px 80px rgba(26, 23, 20, 0.12);
        }

        .auth-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.25em;
            color: #6b4735;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 3rem;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.35em;
            color: #6b4735;
            font-size: 0.72rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Forum', 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 400;
            margin-bottom: 0.8rem;
        }

        .sub {
            max-width: 360px;
            color: #8a7f72;
            line-height: 1.8;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .step {
            display: none;
            width: 100%;
        }

        .step.active {
            display: block;
        }

        input {
            width: 100%;
            border: 1px solid rgba(184, 151, 90, 0.35);
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: 'Jost', sans-serif;
            outline: none;
            background: #f4f0e8;
        }

        input:focus {
            border-color: #6b4735;
        }

        button,
        .button-link {
            width: 100%;
            display: block;
            padding: 1rem;
            border: none;
            background: #6b4735;
            color: white;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 0.5rem;
            font-family: 'Jost', sans-serif;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
        }

        button:hover,
        .button-link:hover {
            background: #a78345;
        }

        .button-dark {
            background: #1a1714;
        }

        .button-dark:hover {
            background: #333;
        }

        .message {
            min-height: 1.4rem;
            margin-top: 1rem;
            color: #b00020;
            font-size: 0.9rem;
        }

        .message.success {
            color: #2f7d47;
        }

        .switch {
            margin-top: 1.5rem;
            color: #8a7f72;
            font-size: 0.9rem;
        }

        .switch a {
            color: #6b4735;
            text-decoration: none;
        }

        @media(max-width: 760px) {
            .auth-wrap {
                width: 95%;
                padding: 2rem;
            }
        }
    </style>
</head>

<body>

<div class="auth-wrap">
    <div class="auth-box">
        <div class="brand">AURUM</div>

        <p class="eyebrow">Account Recovery</p>
        <h1>Reset Password</h1>
        <p class="sub" id="stepCopy">
            Enter your username or email address and we will send a six-digit code.
        </p>

        <div class="step active" id="requestStep">
            <input
                id="identifier"
                type="text"
                placeholder="Username or email"
                autocomplete="username"
            >
            <button type="button" onclick="requestResetCode()">Send Code</button>
            <p class="message" id="requestMessage"></p>
        </div>

        <div class="step" id="verifyStep">
            <input
                id="otp"
                type="text"
                inputmode="numeric"
                maxlength="6"
                autocomplete="one-time-code"
                placeholder="6-digit OTP"
            >
            <button type="button" onclick="verifyResetCode()">Verify Code</button>
            <p class="message" id="verifyMessage"></p>
        </div>

        <div class="step" id="resetStep">
            <input
                id="password"
                type="password"
                placeholder="New password"
                autocomplete="new-password"
            >
            <input
                id="confirmPassword"
                type="password"
                placeholder="Confirm new password"
                autocomplete="new-password"
            >
            <button type="button" onclick="completePasswordReset()">Reset Password</button>
            <a href="{% url 'login' %}" class="button-link button-dark">Continue to Login</a>
            <p class="message" id="resetMessage"></p>
        </div>

        <p class="switch">
            Remembered it?
            <a href="{% url 'login' %}">Back to login</a>
        </p>
    </div>
</div>

<script>
let passwordResetId = sessionStorage.getItem("password_reset_id") || null;

function showStep(stepId) {
    document.querySelectorAll(".step").forEach(step => {
        step.classList.toggle("active", step.id === stepId);
    });
}

function setMessage(id, text, success = false) {
    const element = document.getElementById(id);
    element.textContent = text;
    element.classList.toggle("success", success);
}

async function requestResetCode() {
    const identifier = document.getElementById("identifier").value.trim();
    setMessage("requestMessage", "");

    if (!identifier) {
        setMessage("requestMessage", "Enter your username or email.");
        return;
    }

    try {
        const response = await fetch("/api/password-reset/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({identifier})
        });

        const data = await response.json();

        if (!response.ok) {
            setMessage("requestMessage", data.error || "Unable to send code.");
            return;
        }

        passwordResetId = data.password_reset_id;
        sessionStorage.setItem("password_reset_id", passwordResetId);
        document.getElementById("stepCopy").textContent =
            `We sent a six-digit code to ${data.email}.`;
        showStep("verifyStep");
        document.getElementById("otp").focus();
    } catch {
        setMessage("requestMessage", "Unable to reach the server.");
    }
}

async function verifyResetCode() {
    const otp = document.getElementById("otp").value.trim();
    setMessage("verifyMessage", "");

    if (!/^\d{6}$/.test(otp)) {
        setMessage("verifyMessage", "Enter a valid six-digit code.");
        return;
    }

    const response = await fetch("/api/password-reset/verify/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            password_reset_id: passwordResetId,
            otp
        })
    });

    const data = await response.json();

    if (!response.ok) {
        setMessage("verifyMessage", data.error || "Unable to verify code.");
        return;
    }

    document.getElementById("stepCopy").textContent =
        "Code verified. Choose a new password or continue back to login.";
    showStep("resetStep");
    document.getElementById("password").focus();
}

async function completePasswordReset() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    setMessage("resetMessage", "");

    const response = await fetch("/api/password-reset/complete/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            password_reset_id: passwordResetId,
            password,
            confirm_password: confirmPassword
        })
    });

    const data = await response.json();

    if (!response.ok) {
        setMessage("resetMessage", data.error || "Unable to reset password.");
        return;
    }

    sessionStorage.removeItem("password_reset_id");
    setMessage("resetMessage", "Password reset successfully. Redirecting...", true);
    setTimeout(() => {
        window.location.href = "{% url 'login' %}";
    }, 900);
}
</script>

</body>
</html>
